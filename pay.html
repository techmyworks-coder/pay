<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VeloraPay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b141a; color: #e9edef; height: 100vh; display: flex; flex-direction: column; }
  .header { background: #1f2c34; padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .header .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #00a884, #075e54); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: white; }
  .header .info { flex: 1; }
  .header .name { font-size: 15px; font-weight: 500; }
  .header .online { font-size: 12px; color: #00a884; }
  .chat { flex: 1; overflow-y: auto; padding: 12px 16px; background: #0b141a url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23111b21' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); display: flex; flex-direction: column; gap: 4px; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 85%; animation: pop 0.2s ease; }
  @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .msg-wrap.bot { align-self: flex-start; }
  .msg-wrap.user { align-self: flex-end; }
  .bubble { padding: 8px 12px; font-size: 14.5px; line-height: 1.4; }
  .bot .bubble { background: #1f2c34; border-radius: 0 8px 8px 8px; }
  .user .bubble { background: #005c4b; border-radius: 8px 0 8px 8px; }
  .bubble .time { font-size: 11px; color: #ffffff60; float: right; margin: 4px 0 -4px 12px; }
  .bubble .ticks { color: #53bdeb; font-size: 14px; }
  .typing-bubble { padding: 12px 16px; }
  .typing { display: flex; gap: 4px; }
  .typing span { width: 8px; height: 8px; background: #ffffff40; border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .input-area { background: #1f2c34; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .input-wrap { flex: 1; background: #2a3942; border-radius: 24px; padding: 10px 16px; font-size: 16px; color: #e9edef; min-height: 20px; }
  .send-btn { width: 44px; height: 44px; border-radius: 50%; background: #00a884; border: none; display: flex; align-items: center; justify-content: center; }
  .send-btn svg { fill: white; width: 20px; height: 20px; }
  .amount-big { font-size: 28px; font-weight: 700; margin: 4px 0; }
  .processing { text-align: center; margin: 20px 0; }
  .processing .spinner { width: 32px; height: 32px; border: 3px solid #ffffff20; border-top-color: #00a884; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="avatar" id="h-avatar">P</div>
  <div class="info">
    <div class="name" id="h-name">PRADYUT ENTERPRISES</div>
    <div class="online">online</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <div class="input-wrap" id="input-display"></div>
  <div class="send-btn"><svg viewBox="0 0 24 24"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/></svg></div>
</div>

<script>
  const p = new URLSearchParams(window.location.search);
  const pa = p.get('pa') || 'pradyut@idfcbank';
  const pn = p.get('pn') || 'PRADYUT ENTERPRISES';
  const am = p.get('am') || '10';
  const tn = p.get('tn') || 'TXN' + Date.now();

  document.getElementById('h-name').textContent = pn;
  document.getElementById('h-avatar').textContent = pn.charAt(0);

  const chat = document.getElementById('chat');
  const inputDisplay = document.getElementById('input-display');

  function now() { return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }); }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg-wrap bot';
    el.id = 'typing';
    el.innerHTML = '<div class="bubble typing-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  function addBot(html, delay) {
    return new Promise(resolve => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        const w = document.createElement('div');
        w.className = 'msg-wrap bot';
        w.innerHTML = '<div class="bubble">' + html + '<span class="time">' + now() + '</span></div>';
        chat.appendChild(w);
        chat.scrollTop = chat.scrollHeight;
        resolve();
      }, delay);
    });
  }

  function addUser(text) {
    const w = document.createElement('div');
    w.className = 'msg-wrap user';
    w.innerHTML = '<div class="bubble">' + text + '<span class="time">' + now() + ' <span class="ticks">✓✓</span></span></div>';
    chat.appendChild(w);
    chat.scrollTop = chat.scrollHeight;
  }

  // Simulate typing in the input box
  function simulateType(text, speed) {
    return new Promise(resolve => {
      let i = 0;
      inputDisplay.textContent = '';
      const interval = setInterval(() => {
        inputDisplay.textContent += text.charAt(i);
        i++;
        if (i >= text.length) { clearInterval(interval); resolve(); }
      }, speed);
    });
  }

  function openPay() {
    const upi = 'upi://pay?pa=' + pa + '&pn=' + encodeURIComponent(pn) + '&am=' + parseFloat(am).toFixed(2) + '&tn=' + tn + '&cu=INR';
    window.location.href = 'phonepe://pay?pa=' + pa + '&pn=' + encodeURIComponent(pn) + '&am=' + parseFloat(am).toFixed(2) + '&tn=' + tn + '&cu=INR';
    setTimeout(() => { window.location.href = upi; }, 2000);
  }

  // Full auto flow
  async function run() {
    await addBot('Hi! 👋', 800);
    await addBot('You have a payment request from <strong>' + pn + '</strong>', 1200);
    await addBot('<div class="amount-big">₹' + am + '</div>UPI: ' + pa + '<br><small style="color:#ffffff60">Ref: ' + tn + '</small>', 1000);

    // Simulate user typing the amount
    await new Promise(r => setTimeout(r, 800));
    await simulateType('₹' + am, 120);
    await new Promise(r => setTimeout(r, 600));

    // "Send" the message
    inputDisplay.textContent = '';
    addUser('₹' + am);

    await addBot('Opening payment app...', 800);

    // Add processing spinner
    const proc = document.createElement('div');
    proc.className = 'processing';
    proc.innerHTML = '<div class="spinner"></div><div style="color:#ffffff60;font-size:13px">Redirecting to UPI...</div>';
    chat.appendChild(proc);
    chat.scrollTop = chat.scrollHeight;

    // Open UPI app
    setTimeout(openPay, 1000);
  }

  run();
</script>
</body>
</html>
