<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via Paytm</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #00295e; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { text-align: center; max-width: 320px; }
  .logo { font-size: 28px; font-weight: 800; color: #00b9f5; margin-bottom: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ffffff20; border-top-color: #00b9f5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #ffffff80; font-size: 14px; margin: 8px 0; }
  .amount { font-size: 36px; font-weight: 800; margin: 8px 0; }
  .to { font-size: 13px; color: #ffffff60; }
  .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; }
  .btn-primary { background: #00b9f5; color: white; }
  .btn-secondary { background: #ffffff15; color: #fff; border: 1px solid #ffffff30; }
  .hidden { display: none; }
</style>
<script>
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('pa') || p.get('vpa') || 'pradyut@idfcbank';
  var name = p.get('pn') || 'ABHI ARORA';
  var am = p.get('am') || '1';

  // Detect iOS (includes iPad with desktop UA)
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  var upiParams = 'pa=' + encodeURIComponent(vpa) + '&pn=' + encodeURIComponent(name) + '&am=' + am + '&tn=Payment&cu=INR';

  var links;
  if (isIOS) {
    links = [
      // iOS: paytmmp:// pay scheme (opens Paytm if installed)
      'paytmmp://pay?' + upiParams,
      // iOS fallback: generic upi:// scheme (lets user pick any UPI app)
      'upi://pay?' + upiParams
    ];
  } else {
    links = [
      // Android: intent with DeepLinkActivity (most reliable)
      'intent://cash_wallet?featuretype=money_transfer&' + upiParams + '#Intent;scheme=paytmmp;component=net.one97.paytm/net.one97.paytm.landingpage.activity.DeepLinkActivity;end',
      // Android fallback: native scheme
      'paytmmp://cash_wallet?featuretype=money_transfer&' + upiParams,
      // Android fallback: standard UPI
      'upi://pay?' + upiParams
    ];
  }

  function openLink(url) {
    if (isIOS) {
      var a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); }, 100);
    } else {
      window.location.href = url;
    }
  }

  var tried = 0;
  function tryOpen(index) {
    var i = (index !== undefined) ? index : tried++;
    if (i < links.length) openLink(links[i]);
  }

  window.onload = function() {
    document.getElementById('amt').textContent = '\u20B9' + am;
    document.getElementById('name').textContent = name;

    if (isIOS) {
      // iOS: show tap buttons immediately (auto-redirect is blocked by Safari)
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Tap below to open Paytm';
      document.getElementById('buttons').classList.remove('hidden');
    } else {
      // Android: auto-redirect cascade
      tryOpen();
      setTimeout(tryOpen, 2000);
      setTimeout(tryOpen, 4000);
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Paytm did not open?';
        document.getElementById('buttons').classList.remove('hidden');
      }, 5000);
    }
  };
</script>
</head>
<body>
<div class="card">
  <div class="logo">Paytm</div>
  <div class="amount" id="amt">₹1</div>
  <div class="to">Pay to <strong id="name">ABHI ARORA</strong></div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Opening Paytm...</div>
  <div id="buttons" class="hidden">
    <a class="btn btn-primary" href="#" onclick="tryOpen(0);return false;">Open Paytm</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(1);return false;" id="ptm-btn2">Open via UPI</a>
  </div>
</div>
</body>
</html>
